  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"460e5e92-2ee4-4002-a0d8-fad3fabd50d5\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'EB Garamond';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"7267541f-c871-4e59-9ffa-171b7cf393ec\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"b8646e9a-7e21-4a05-ab1e-7ae97cda450f\"><\u002Fscript>\n<style>\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; background:#14100b; }\n  ::selection{ background:#c9a44c; color:#14100b; }\n  ::-webkit-scrollbar{ width:11px; height:11px; }\n  ::-webkit-scrollbar-track{ background:#14100b; }\n  ::-webkit-scrollbar-thumb{ background:#3a2f1c; border:2px solid #14100b; border-radius:6px; }\n  ::-webkit-scrollbar-thumb:hover{ background:#5a4a2a; }\n  @keyframes wx-fade{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }\n  @keyframes wx-fadein{ from{ opacity:0; } to{ opacity:1; } }\n  @keyframes wx-flicker{ 0%,100%{ opacity:.85; } 50%{ opacity:1; } }\n  image-slot{ display:block; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; background:#14100b; background-image:radial-gradient(1200px 600px at 50% -8%, rgba(201,164,76,.10), transparent 60%), radial-gradient(900px 700px at 100% 100%, rgba(120,30,30,.06), transparent 55%); color:#d8c8a4; font-family:'EB Garamond', Georgia, serif; -webkit-font-smoothing:antialiased;\">\n\n  <nav style=\"position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:22px; padding:0 26px; height:64px; background:linear-gradient(180deg,#1b160e,#161109); border-bottom:1px solid #3a2f1c; box-shadow:0 6px 22px rgba(0,0,0,.45);\">\n    <div onclick=\"{{ goHome }}\" style=\"display:flex; align-items:center; gap:11px; cursor:pointer; user-select:none; margin-right:6px;\">\n      <div style=\"width:30px; height:34px; background:linear-gradient(160deg,#c9a44c,#8a6d2f); clip-path:polygon(50% 0,100% 22%,100% 64%,50% 100%,0 64%,0 22%); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.5);\">\n        <span style=\"font-family:'Cinzel',serif; font-weight:900; font-size:15px; color:#14100b;\">W<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"line-height:1;\">\n        <div style=\"font-family:'Cinzel Decorative',serif; font-weight:700; font-size:16px; letter-spacing:.06em; color:#e8dcc1;\">WESTEROS<\u002Fdiv>\n        <div style=\"font-size:11px; letter-spacing:.32em; color:#9a7d3e; text-transform:uppercase;\">Enciclopedia<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative; display:flex; align-items:stretch; margin-left:14px;\">\n      <button onclick=\"{{ stepPrev }}\" title=\"Punto anterior\" style=\"display:flex; align-items:center; justify-content:center; width:30px; background:rgba(201,164,76,.06); border:1px solid #3a2f1c; border-right:none; border-radius:3px 0 0 3px; color:#c9a44c; font-size:11px; cursor:pointer;\" style-hover=\"background:rgba(201,164,76,.18);\">◀<\u002Fbutton>\n      <button onclick=\"{{ toggleProg }}\" style=\"display:flex; align-items:center; gap:9px; background:rgba(201,164,76,.10); border:1px solid #c9a44c; padding:6px 12px; cursor:pointer; min-width:172px;\" style-hover=\"background:rgba(201,164,76,.18);\">\n        <span style=\"width:9px; height:9px; border-radius:50%; background:{{ progDotColor }}; flex-shrink:0; box-shadow:0 0 6px {{ progDotColor }};\"><\u002Fspan>\n        <span style=\"display:flex; flex-direction:column; align-items:flex-start; line-height:1.15; flex:1;\">\n          <span style=\"font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:#9a7d3e;\">Punto de la saga<\u002Fspan>\n          <span style=\"font-family:'Cinzel',serif; font-size:12px; color:#f0e6cd; white-space:nowrap; max-width:150px; overflow:hidden; text-overflow:ellipsis;\">{{ progLabel }}<\u002Fspan>\n        <\u002Fspan>\n        <span style=\"font-size:9px; color:#9a7d3e;\">▼<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"{{ stepNext }}\" title=\"Punto siguiente\" style=\"display:flex; align-items:center; justify-content:center; width:30px; background:rgba(201,164,76,.06); border:1px solid #3a2f1c; border-left:none; border-radius:0 3px 3px 0; color:#c9a44c; font-size:11px; cursor:pointer;\" style-hover=\"background:rgba(201,164,76,.18);\">▶<\u002Fbutton>\n\n      <sc-if value=\"{{ progOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; left:0; top:54px; width:330px; background:#1b160e; border:1px solid #4a3c22; border-radius:4px; box-shadow:0 16px 40px rgba(0,0,0,.6); overflow:hidden; z-index:60; animation:wx-fade .18s ease;\">\n          <div style=\"padding:11px 14px 9px; font-size:11px; line-height:1.5; color:#9a8a6a; border-bottom:1px solid #2a2114;\">Elige por dónde vas. La enciclopedia, la cronología y el mapa se adaptarán para no mostrarte spoilers.<\u002Fdiv>\n          <button onclick=\"{{ allOpt.pick }}\" style=\"{{ allOpt.style }}\" style-hover=\"background:rgba(201,164,76,.12);\">\n            <span style=\"width:8px; height:8px; border-radius:50%; background:{{ allOpt.dot }}; flex-shrink:0;\"><\u002Fspan>\n            <span style=\"flex:1;\">{{ allOpt.label }}<\u002Fspan>\n            <sc-if value=\"{{ allOpt.active }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#c9a44c;\">✓<\u002Fspan><\u002Fsc-if>\n          <\u002Fbutton>\n          <div style=\"display:flex; border-top:1px solid #2a2114; border-bottom:1px solid #2a2114;\">\n            <sc-for list=\"{{ progModes }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ m.pick }}\" style=\"{{ m.style }}\">{{ m.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"max-height:300px; overflow:auto;\">\n            <sc-for list=\"{{ progPoints }}\" as=\"p\" hint-placeholder-count=\"7\">\n              <button onclick=\"{{ p.pick }}\" style=\"{{ p.style }}\" style-hover=\"background:rgba(201,164,76,.10);\">\n                <span style=\"width:8px; height:8px; border-radius:50%; background:{{ p.dot }}; flex-shrink:0;\"><\u002Fspan>\n                <span style=\"flex:1;\">{{ p.label }}<\u002Fspan>\n                <sc-if value=\"{{ p.active }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#c9a44c;\">✓<\u002Fspan><\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; align-items:center; gap:3px; margin-left:auto;\">\n      <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"6\">\n        <button onclick=\"{{ item.go }}\" style=\"{{ item.style }}\" style-hover=\"color:#e8dcc1; background:rgba(201,164,76,.10);\">{{ item.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"position:relative; margin-left:14px;\">\n      <button onclick=\"{{ toggleLang }}\" style=\"display:flex; align-items:center; gap:7px; background:rgba(201,164,76,.08); border:1px solid #3a2f1c; color:#cdbf9e; font-family:'Cinzel',serif; font-size:12px; letter-spacing:.08em; padding:8px 12px; border-radius:3px; cursor:pointer;\" style-hover=\"border-color:#c9a44c;\">\n        <span style=\"font-size:13px;\">{{ langFlag }}<\u002Fspan><span>{{ langCode }}<\u002Fspan>\n        <span style=\"font-size:9px; color:#9a7d3e;\">▼<\u002Fspan>\n      <\u002Fbutton>\n      <sc-if value=\"{{ langOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; right:0; top:46px; min-width:170px; background:#1b160e; border:1px solid #3a2f1c; border-radius:4px; box-shadow:0 14px 34px rgba(0,0,0,.6); overflow:hidden; animation:wx-fade .18s ease;\">\n          <sc-for list=\"{{ langs }}\" as=\"lg\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ lg.pick }}\" style=\"{{ lg.style }}\" style-hover=\"background:rgba(201,164,76,.12);\">\n              <span style=\"font-size:14px;\">{{ lg.flag }}<\u002Fspan>\n              <span style=\"flex:1; text-align:left;\">{{ lg.name }}<\u002Fspan>\n              <sc-if value=\"{{ lg.active }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#c9a44c;\">✓<\u002Fspan><\u002Fsc-if>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div style=\"padding:8px 12px; font-size:11px; color:#6b5c40; border-top:1px solid #2a2114; font-style:italic;\">El cambio de idioma es decorativo por ahora.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <main style=\"max-width:1280px; margin:0 auto; padding:0 26px 90px;\">\n\n    <!-- ===================== INICIO ===================== -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"animation:wx-fadein .5s ease;\">\n        <div style=\"position:relative; margin:0 -26px; padding:74px 26px 64px; text-align:center; overflow:hidden; border-bottom:1px solid #3a2f1c;\">\n          <div style=\"position:absolute; inset:0; background-image:radial-gradient(700px 320px at 50% 0%, rgba(201,164,76,.16), transparent 65%); pointer-events:none;\"><\u002Fdiv>\n          <div style=\"position:relative;\">\n            <div style=\"font-size:12px; letter-spacing:.42em; color:#9a7d3e; text-transform:uppercase; margin-bottom:20px;\">Canción de Hielo y Fuego &nbsp;·&nbsp; Poniente y Essos<\u002Fdiv>\n            <h1 style=\"font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(40px,7vw,82px); line-height:1.02; margin:0; color:#f0e6cd; text-shadow:0 3px 20px rgba(0,0,0,.6);\">Enciclopedia<br>de Westeros<\u002Fh1>\n            <p style=\"max-width:640px; margin:24px auto 0; font-size:19px; line-height:1.6; color:#c2b389;\">El compendio de las grandes sagas: <em style=\"color:#e8dcc1;\">Juego de Tronos<\u002Fem>, <em style=\"color:#e8dcc1;\">La Casa del Dragón<\u002Fem> y <em style=\"color:#e8dcc1;\">El Caballero de los Siete Reinos<\u002Fem>. Personajes, casas, mapas, genealogías y siglos de historia, reunidos en un solo lugar.<\u002Fp>\n            <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:34px;\">\n              <button onclick=\"{{ goEncyclopedia }}\" style=\"font-family:'Cinzel',serif; font-weight:600; font-size:14px; letter-spacing:.06em; padding:14px 26px; background:linear-gradient(180deg,#c9a44c,#9a7d3e); color:#14100b; border:none; border-radius:3px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.4);\" style-hover=\"filter:brightness(1.08);\">Explorar la enciclopedia<\u002Fbutton>\n              <button onclick=\"{{ goMap }}\" style=\"font-family:'Cinzel',serif; font-weight:600; font-size:14px; letter-spacing:.06em; padding:14px 26px; background:transparent; color:#e8dcc1; border:1px solid #5a4a2a; border-radius:3px; cursor:pointer;\" style-hover=\"border-color:#c9a44c;\">Ver el mapa<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:1px; background:#3a2f1c; margin:36px 0 8px; border:1px solid #3a2f1c;\">\n          <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"background:#1a140d; padding:24px 18px; text-align:center;\">\n              <div style=\"font-family:'Cinzel',serif; font-weight:800; font-size:34px; color:#c9a44c;\">{{ s.n }}<\u002Fdiv>\n              <div style=\"font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#8a7a5c; margin-top:4px;\">{{ s.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <h2 style=\"font-family:'Cinzel',serif; font-weight:700; font-size:24px; color:#e8dcc1; margin:52px 0 6px; text-align:center;\">Las tres sagas<\u002Fh2>\n        <div style=\"width:60px; height:2px; background:#c9a44c; margin:0 auto 30px;\"><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:18px;\">\n          <sc-for list=\"{{ sagas }}\" as=\"sg\" hint-placeholder-count=\"3\">\n            <div style=\"position:relative; background:linear-gradient(180deg,#1d1710,#171108); border:1px solid #3a2f1c; border-top:3px solid {{ sg.color }}; padding:26px; display:flex; flex-direction:column; gap:10px;\">\n              <div style=\"font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:{{ sg.color }};\">{{ sg.kicker }}<\u002Fdiv>\n              <h3 style=\"font-family:'Cinzel',serif; font-weight:700; font-size:21px; color:#f0e6cd; margin:0;\">{{ sg.title }}<\u002Fh3>\n              <div style=\"font-size:13px; color:#8a7a5c; font-style:italic;\">{{ sg.era }}<\u002Fdiv>\n              <p style=\"font-size:15px; line-height:1.6; color:#c2b389; margin:4px 0 0;\">{{ sg.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <h2 style=\"font-family:'Cinzel',serif; font-weight:700; font-size:24px; color:#e8dcc1; margin:56px 0 6px; text-align:center;\">Navega por la enciclopedia<\u002Fh2>\n        <div style=\"width:60px; height:2px; background:#c9a44c; margin:0 auto 30px;\"><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px;\">\n          <sc-for list=\"{{ portals }}\" as=\"p\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ p.go }}\" style=\"text-align:left; background:#1a140d; border:1px solid #3a2f1c; padding:22px; cursor:pointer; display:flex; flex-direction:column; gap:8px; transition:transform .15s ease;\" style-hover=\"border-color:#c9a44c; transform:translateY(-3px);\">\n              <span style=\"font-size:26px;\">{{ p.icon }}<\u002Fspan>\n              <span style=\"font-family:'Cinzel',serif; font-weight:600; font-size:17px; color:#e8dcc1;\">{{ p.title }}<\u002Fspan>\n              <span style=\"font-size:14px; line-height:1.5; color:#8a7a5c;\">{{ p.desc }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===================== ENCICLOPEDIA ===================== -->\n    <sc-if value=\"{{ isEnc }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"animation:wx-fadein .4s ease; padding-top:38px;\">\n        <div style=\"text-align:center; margin-bottom:28px;\">\n          <div style=\"font-size:12px; letter-spacing:.36em; color:#9a7d3e; text-transform:uppercase;\">El Compendio<\u002Fdiv>\n          <h1 style=\"font-family:'Cinzel',serif; font-weight:800; font-size:clamp(30px,5vw,46px); color:#f0e6cd; margin:8px 0 0;\">Enciclopedia<\u002Fh1>\n        <\u002Fdiv>\n        <sc-if value=\"{{ progActive }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:620px; margin:0 auto 22px; text-align:center; font-size:14px; color:#9a8a6a; background:rgba(201,164,76,.07); border:1px solid #3a2f1c; border-radius:3px; padding:10px 16px;\">Mostrando el estado de los personajes en <strong style=\"color:#c9a44c;\">{{ progLabel }}<\u002Fstrong>. Los que aún no aparecen se atenúan; cámbialo en el navbar.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex; gap:6px; justify-content:center; margin-bottom:20px; flex-wrap:wrap;\">\n          <sc-for list=\"{{ encTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ t.pick }}\" style=\"font-family:'Cinzel',serif; font-size:14px; letter-spacing:.04em; padding:11px 22px; cursor:pointer; border:1px solid {{ t.borderC }}; background:{{ t.bg }}; color:{{ t.fg }}; border-radius:3px;\">{{ t.label }} <span style=\"opacity:.6; font-size:12px;\">{{ t.count }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"max-width:520px; margin:0 auto 18px;\">\n          <input value=\"{{ encSearch }}\" oninput=\"{{ setEncSearch }}\" placeholder=\"Buscar por nombre, lema o descripción...\" style=\"width:100%; padding:13px 16px; background:#1a140d; border:1px solid #3a2f1c; border-radius:3px; color:#e8dcc1; font-family:'EB Garamond',serif; font-size:15px; outline:none;\">\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ showHouseFilter }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:26px;\">\n            <sc-for list=\"{{ houseChips }}\" as=\"ch\" hint-placeholder-count=\"8\">\n              <button onclick=\"{{ ch.pick }}\" style=\"{{ ch.style }}\">{{ ch.name }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"font-size:13px; color:#6b5c40; text-align:center; margin-bottom:18px;\">{{ encCount }} resultados<\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px;\">\n          <sc-for list=\"{{ encItems }}\" as=\"it\" hint-placeholder-count=\"8\">\n            <button onclick=\"{{ it.open }}\" style=\"text-align:left; position:relative; background:linear-gradient(180deg,#1d1710,#171108); border:1px solid #3a2f1c; border-left:3px solid {{ it.accent }}; padding:18px 18px 16px; cursor:pointer; display:flex; flex-direction:column; gap:7px; min-height:130px; opacity:{{ it.dim }}; transition:transform .14s ease, border-color .14s ease, opacity .2s ease;\" style-hover=\"transform:translateY(-3px); border-color:#c9a44c; opacity:1;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:8px;\">\n                <h3 style=\"font-family:'Cinzel',serif; font-weight:600; font-size:17px; color:#f0e6cd; margin:0; line-height:1.2;\">{{ it.name }}<\u002Fh3>\n                <span style=\"flex-shrink:0; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:{{ it.statusColor }}; border:1px solid {{ it.statusColor }}; padding:2px 7px; border-radius:10px; margin-top:2px;\">{{ it.status }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:13px; color:#9a7d3e; font-style:italic;\">{{ it.houseLabel }}<\u002Fdiv>\n              <p style=\"font-size:14px; line-height:1.45; color:#b5a684; margin:0; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;\">{{ it.sub }}<\u002Fp>\n              <div style=\"display:flex; gap:5px; flex-wrap:wrap; margin-top:auto;\">\n                <sc-for list=\"{{ it.tags }}\" as=\"tg\" hint-placeholder-count=\"1\">\n                  <span style=\"font-size:10px; letter-spacing:.04em; color:{{ tg.color }}; border:1px solid {{ tg.color }}; opacity:.85; padding:2px 6px; border-radius:3px;\">{{ tg.label }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===================== CRONOLOGÍA ===================== -->\n    <sc-if value=\"{{ isTimeline }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"animation:wx-fadein .4s ease; padding-top:38px;\">\n        <div style=\"text-align:center; margin-bottom:24px;\">\n          <div style=\"font-size:12px; letter-spacing:.36em; color:#9a7d3e; text-transform:uppercase;\">A través de las Eras<\u002Fdiv>\n          <h1 style=\"font-family:'Cinzel',serif; font-weight:800; font-size:clamp(30px,5vw,46px); color:#f0e6cd; margin:8px 0 0;\">Línea de Tiempo<\u002Fh1>\n          <p style=\"font-size:15px; color:#8a7a5c; margin:10px 0 0;\">Las fechas usan el calendario «después de la Conquista» (d.C.).<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:38px;\">\n          <sc-for list=\"{{ tlFilters }}\" as=\"f\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ f.pick }}\" style=\"{{ f.style }}\">{{ f.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"max-width:760px; margin:0 auto; position:relative; padding-left:34px; border-left:2px solid #3a2f1c;\">\n          <sc-for list=\"{{ tlItems }}\" as=\"e\" hint-placeholder-count=\"6\">\n            <div style=\"position:relative; margin-bottom:30px;\">\n              <div style=\"position:absolute; left:-43px; top:4px; width:16px; height:16px; border-radius:50%; background:{{ e.color }}; border:3px solid #14100b; box-shadow:0 0 0 2px {{ e.color }};\"><\u002Fdiv>\n              <div style=\"background:linear-gradient(180deg,#1d1710,#171108); border:1px solid #3a2f1c; border-left:3px solid {{ e.color }}; padding:18px 22px; opacity:{{ e.dim }};\">\n                <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:4px;\">\n                  <span style=\"font-family:'Cinzel',serif; font-weight:700; font-size:18px; color:#c9a44c;\">{{ e.year }}<\u002Fspan>\n                  <span style=\"font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:{{ e.color }}; border:1px solid {{ e.color }}; padding:2px 8px; border-radius:3px;\">{{ e.sagaLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <h3 style=\"font-family:'Cinzel',serif; font-weight:600; font-size:19px; color:#f0e6cd; margin:2px 0 6px;\">{{ e.title }}<\u002Fh3>\n                <p style=\"font-size:15px; line-height:1.65; color:#b5a684; margin:0;\">{{ e.desc }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===================== CURIOSIDADES ===================== -->\n    <sc-if value=\"{{ isCurios }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"animation:wx-fadein .4s ease; padding-top:38px;\">\n        <div style=\"text-align:center; margin-bottom:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.36em; color:#9a7d3e; text-transform:uppercase;\">Secretos del Reino<\u002Fdiv>\n          <h1 style=\"font-family:'Cinzel',serif; font-weight:800; font-size:clamp(30px,5vw,46px); color:#f0e6cd; margin:8px 0 0;\">Curiosidades<\u002Fh1>\n          <p style=\"font-size:15px; color:#8a7a5c; margin:10px 0 0;\">Toca cada pregunta para revelar la respuesta.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px; max-width:1100px; margin:0 auto;\">\n          <sc-for list=\"{{ curios }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ c.toggle }}\" style=\"text-align:left; background:linear-gradient(180deg,#1d1710,#171108); border:1px solid #3a2f1c; padding:18px 20px; cursor:pointer; display:flex; flex-direction:column; gap:8px;\" style-hover=\"border-color:#c9a44c;\">\n              <span style=\"font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#c9a44c;\">{{ c.cat }}<\u002Fspan>\n              <div style=\"display:flex; justify-content:space-between; gap:12px; align-items:flex-start;\">\n                <h3 style=\"font-family:'Cinzel',serif; font-weight:600; font-size:17px; color:#f0e6cd; margin:0; line-height:1.3;\">{{ c.q }}<\u002Fh3>\n                <span style=\"flex-shrink:0; font-family:'Cinzel',serif; font-size:22px; color:#9a7d3e; line-height:1;\">{{ c.sign }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ c.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <p style=\"font-size:15px; line-height:1.65; color:#cdbf9e; margin:6px 0 0; animation:wx-fade .25s ease;\">{{ c.a }}<\u002Fp>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ c.locked }}\" hint-placeholder-val=\"{{ false }}\">\n                <p style=\"font-size:14px; line-height:1.5; color:#6f6552; margin:6px 0 0; font-style:italic;\">Oculto para evitar spoilers más allá de tu punto en la saga.<\u002Fp>\n              <\u002Fsc-if>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===================== MAPA ===================== -->\n    <sc-if value=\"{{ isMap }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"animation:wx-fadein .4s ease; padding-top:38px;\">\n        <div style=\"text-align:center; margin-bottom:24px;\">\n          <div style=\"font-size:12px; letter-spacing:.36em; color:#9a7d3e; text-transform:uppercase;\">El Continente Poniente<\u002Fdiv>\n          <h1 style=\"font-family:'Cinzel',serif; font-weight:800; font-size:clamp(30px,5vw,46px); color:#f0e6cd; margin:8px 0 0;\">Mapa de los Siete Reinos<\u002Fh1>\n          <p style=\"font-size:15px; color:#8a7a5c; margin:10px 0 0;\">Pasa el cursor o toca una región para descubrir quién la gobierna.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1.4fr 1fr; gap:26px; align-items:start;\">\n          <div style=\"background:linear-gradient(180deg,#15110b,#0f0c07); border:1px solid #3a2f1c; padding:14px; border-radius:4px;\">\n            <svg viewBox=\"0 0 1000 1300\" style=\"width:100%; height:auto; display:block;\" preserveAspectRatio=\"xMidYMid meet\">\n              <defs>\n                <radialGradient id=\"sea\" cx=\"50%\" cy=\"40%\" r=\"75%\">\n                  <stop offset=\"0%\" stop-color=\"#15212a\"><\u002Fstop>\n                  <stop offset=\"100%\" stop-color=\"#0c1318\"><\u002Fstop>\n                <\u002FradialGradient>\n              <\u002Fdefs>\n              <rect x=\"0\" y=\"0\" width=\"1000\" height=\"1300\" fill=\"url(#sea)\"><\u002Frect>\n              <line x1=\"235\" y1=\"252\" x2=\"800\" y2=\"252\" stroke=\"#dfeefb\" stroke-width=\"5\" stroke-dasharray=\"3 7\" opacity=\"0.7\"><\u002Fline>\n              <text x=\"500\" y=\"245\" text-anchor=\"middle\" fill=\"#cfe4f5\" font-family=\"Cinzel, serif\" font-size=\"15\" letter-spacing=\"3\" opacity=\"0.85\">EL MURO<\u002Ftext>\n              <sc-for list=\"{{ regions }}\" as=\"r\" hint-placeholder-count=\"10\">\n                <g style=\"cursor:pointer;\">\n                  <polygon points=\"{{ r.pts }}\" fill=\"{{ r.fill }}\" stroke=\"{{ r.stroke }}\" stroke-width=\"{{ r.sw }}\" onmouseenter=\"{{ r.select }}\" onclick=\"{{ r.select }}\" style=\"transition:fill .2s ease;\"><\u002Fpolygon>\n                  <text x=\"{{ r.cx }}\" y=\"{{ r.cy }}\" text-anchor=\"middle\" fill=\"{{ r.labelFill }}\" font-family=\"Cinzel, serif\" font-size=\"19\" font-weight=\"600\" pointer-events=\"none\" style=\"text-shadow:0 1px 4px rgba(0,0,0,.9);\">{{ r.name }}<\u002Ftext>\n                <\u002Fg>\n              <\u002Fsc-for>\n              <text x=\"500\" y=\"1285\" text-anchor=\"middle\" fill=\"#3a5663\" font-family=\"EB Garamond, serif\" font-size=\"20\" font-style=\"italic\">Mar del Verano<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fdiv>\n\n          <div style=\"position:sticky; top:88px;\">\n            <div style=\"background:linear-gradient(180deg,#221a10,#181208); border:1px solid #4a3c22; padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:14px;\">\n              <span style=\"font-size:26px;\">⚔<\u002Fspan>\n              <div style=\"line-height:1.3;\">\n                <div style=\"font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#9a7d3e;\">El Trono de Hierro<\u002Fdiv>\n                <div style=\"font-family:'Cinzel',serif; font-size:16px; color:#f0e6cd;\">{{ throneHouse }}<\u002Fdiv>\n                <div style=\"font-size:13px; color:#c9a44c; font-style:italic;\">{{ throneWho }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasRegion }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:linear-gradient(180deg,#1f180f,#181208); border:1px solid #4a3c22; border-top:4px solid {{ activeRegion.color }}; padding:26px; animation:wx-fade .25s ease;\">\n                <h2 style=\"font-family:'Cinzel',serif; font-weight:800; font-size:26px; color:#f0e6cd; margin:0 0 4px;\">{{ activeRegion.name }}<\u002Fh2>\n                <div style=\"font-size:16px; color:#c9a44c; font-style:italic; margin-bottom:18px;\">{{ activeRegion.house }}<\u002Fdiv>\n                <p style=\"font-size:16px; line-height:1.7; color:#cdbf9e; margin:0 0 18px;\">{{ activeRegion.info }}<\u002Fp>\n                <div style=\"display:grid; grid-template-columns:auto 1fr; gap:8px 16px; font-size:15px; border-top:1px solid #3a2f1c; padding-top:14px;\">\n                  <span style=\"color:#8a7a5c;\">Asiento<\u002Fspan><span style=\"color:#e8dcc1;\">{{ activeRegion.seat }}<\u002Fspan>\n                  <span style=\"color:#8a7a5c;\">Gobernante<\u002Fspan><span style=\"color:#e8dcc1;\">{{ activeRegion.house }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noRegion }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#1a140d; border:1px dashed #3a2f1c; padding:40px 26px; text-align:center; color:#8a7a5c;\">\n                <div style=\"font-size:40px; margin-bottom:12px;\">🦵<\u002Fdiv>\n                <p style=\"font-size:16px; line-height:1.6; margin:0;\">Selecciona una región del mapa para ver su casa gobernante, su asiento y su historia.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===================== GENEALOGÍA ===================== -->\n    <sc-if value=\"{{ isTree }}\" hint-placeholder-val=\"{{ false }}\">\n      <section style=\"animation:wx-fadein .4s ease; padding-top:38px;\">\n        <div style=\"text-align:center; margin-bottom:24px;\">\n          <div style=\"font-size:12px; letter-spacing:.36em; color:#9a7d3e; text-transform:uppercase;\">Linajes y Sangre<\u002Fdiv>\n          <h1 style=\"font-family:'Cinzel',serif; font-weight:800; font-size:clamp(30px,5vw,46px); color:#f0e6cd; margin:8px 0 0;\">Árboles Genealógicos<\u002Fh1>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:34px;\">\n          <sc-for list=\"{{ treeButtons }}\" as=\"b\" hint-placeholder-count=\"7\">\n            <button onclick=\"{{ b.pick }}\" style=\"{{ b.style }}\">{{ b.name }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"max-width:900px; margin:0 auto;\">\n          <div style=\"text-align:center; margin-bottom:30px;\">\n            <h2 style=\"font-family:'Cinzel',serif; font-weight:700; font-size:26px; color:#f0e6cd; margin:0 0 8px;\">{{ tree.label }}<\u002Fh2>\n            <p style=\"font-size:15px; line-height:1.6; color:#9a8a6a; max-width:600px; margin:0 auto; font-style:italic;\">{{ tree.note }}<\u002Fp>\n          <\u002Fdiv>\n\n          <div style=\"position:relative;\">\n            <sc-for list=\"{{ tree.gens }}\" as=\"gen\" hint-placeholder-count=\"3\">\n              <div style=\"position:relative; display:flex; flex-direction:column; align-items:center; padding-bottom:30px;\">\n                <div style=\"font-family:'Cinzel',serif; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:{{ tree.accent }}; margin-bottom:14px; text-align:center;\">{{ gen.g }}<\u002Fdiv>\n                <div style=\"display:flex; gap:14px; flex-wrap:wrap; justify-content:center;\">\n                  <sc-for list=\"{{ gen.people }}\" as=\"p\" hint-placeholder-count=\"3\">\n                    <div style=\"background:linear-gradient(180deg,#1d1710,#171108); border:1px solid #3a2f1c; border-bottom:2px solid {{ tree.accent }}; padding:13px 18px; min-width:150px; max-width:230px; text-align:center; font-family:'EB Garamond',serif; font-size:15px; color:#e8dcc1; box-shadow:0 4px 12px rgba(0,0,0,.3);\">{{ p }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-if value=\"{{ gen.hasNext }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"width:1px; height:30px; background:linear-gradient(180deg,{{ tree.accent }},transparent); position:absolute; bottom:0; left:50%; transform:translateX(-50%);\"><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"text-align:center; font-size:13px; color:#6b5c40; font-style:italic; margin-top:6px;\">Diagrama por generaciones. Las relaciones (matrimonios, ramas) se indican en cada tarjeta.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===================== DETALLE (modal) ===================== -->\n    <sc-if value=\"{{ hasDetail }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ closeDetail }}\" style=\"position:fixed; inset:0; z-index:80; background:rgba(8,6,3,.78); backdrop-filter:blur(3px); display:flex; align-items:flex-start; justify-content:center; padding:70px 18px 40px; overflow:auto; animation:wx-fadein .2s ease;\">\n        <div onclick=\"{{ stop }}\" style=\"position:relative; width:100%; max-width:760px; background:linear-gradient(180deg,#211a11,#19130b); border:1px solid #4a3c22; border-top:4px solid {{ detail.accent }}; box-shadow:0 30px 70px rgba(0,0,0,.7); animation:wx-fade .28s ease;\">\n          <button onclick=\"{{ closeDetail }}\" style=\"position:absolute; top:14px; right:14px; z-index:2; width:34px; height:34px; border-radius:50%; border:1px solid #4a3c22; background:rgba(0,0,0,.4); color:#c9a44c; font-size:18px; cursor:pointer; line-height:1;\" style-hover=\"border-color:#c9a44c;\">✕<\u002Fbutton>\n          <div style=\"display:flex; gap:0; flex-wrap:wrap;\">\n            <div style=\"flex:1 1 240px; min-width:220px; background:#0f0b06; display:flex; align-items:stretch;\">\n              <image-slot id=\"{{ detail.slotId }}\" style=\"width:100%; min-height:280px; height:100%;\" shape=\"rect\" placeholder=\"{{ detail.placeholder }}\"><\u002Fimage-slot>\n            <\u002Fdiv>\n            <div style=\"flex:2 1 340px; padding:28px 30px 30px;\">\n              <div style=\"display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:6px;\">\n                <span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:{{ detail.statusColor }}; border:1px solid {{ detail.statusColor }}; padding:2px 9px; border-radius:11px;\">{{ detail.status }}<\u002Fspan>\n                <sc-for list=\"{{ detail.tags }}\" as=\"tg\" hint-placeholder-count=\"1\">\n                  <span style=\"font-size:11px; color:{{ tg.color }}; border:1px solid {{ tg.color }}; padding:2px 8px; border-radius:3px;\">{{ tg.label }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <h2 style=\"font-family:'Cinzel',serif; font-weight:800; font-size:28px; color:#f0e6cd; margin:6px 0 4px; line-height:1.12;\">{{ detail.name }}<\u002Fh2>\n              <div style=\"font-size:16px; color:#c9a44c; font-style:italic; margin-bottom:18px;\">{{ detail.title }}<\u002Fdiv>\n              <p style=\"font-size:16px; line-height:1.7; color:#cdbf9e; margin:0 0 18px;\">{{ detail.bio }}<\u002Fp>\n              <sc-if value=\"{{ detail.isHouse }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:grid; grid-template-columns:auto 1fr; gap:8px 16px; font-size:15px; border-top:1px solid #3a2f1c; padding-top:16px;\">\n                  <span style=\"color:#8a7a5c;\">Asiento<\u002Fspan><span style=\"color:#e8dcc1;\">{{ detail.seat }}<\u002Fspan>\n                  <span style=\"color:#8a7a5c;\">Región<\u002Fspan><span style=\"color:#e8dcc1;\">{{ detail.status }}<\u002Fspan>\n                  <span style=\"color:#8a7a5c;\">Blasón<\u002Fspan><span style=\"color:#e8dcc1;\">{{ detail.animal }}<\u002Fspan>\n                  <span style=\"color:#8a7a5c;\">Estado<\u002Fspan><span style=\"color:#e8dcc1;\">{{ detail.houseStatus }}<\u002Fspan>\n                <\u002Fdiv>\n                <sc-if value=\"{{ detail.hasMembers }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:18px; border-top:1px solid #3a2f1c; padding-top:14px;\">\n                    <div style=\"font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#9a7d3e; margin-bottom:9px;\">Miembros destacados<\u002Fdiv>\n                    <div style=\"display:flex; gap:7px; flex-wrap:wrap;\">\n                      <sc-for list=\"{{ detail.members }}\" as=\"m\" hint-placeholder-count=\"3\">\n                        <span style=\"font-size:13px; color:#cdbf9e; background:rgba(201,164,76,.08); border:1px solid #3a2f1c; padding:4px 10px; border-radius:3px;\">{{ m }}<\u002Fspan>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ detail.isChar }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:grid; grid-template-columns:auto 1fr; gap:8px 16px; font-size:15px; border-top:1px solid #3a2f1c; padding-top:16px;\">\n                  <span style=\"color:#8a7a5c;\">Casa<\u002Fspan><span style=\"color:#e8dcc1;\">{{ detail.house }}<\u002Fspan>\n                  <span style=\"color:#8a7a5c;\">Cultura<\u002Fspan><span style=\"color:#e8dcc1;\">{{ detail.culture }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer style=\"border-top:1px solid #3a2f1c; padding:30px 26px; text-align:center; background:#16110a;\">\n    <div style=\"font-family:'Cinzel Decorative',serif; font-size:14px; letter-spacing:.1em; color:#9a7d3e;\">WESTEROS · Enciclopedia<\u002Fdiv>\n    <div style=\"font-size:13px; color:#6b5c40; margin-top:8px; max-width:560px; margin-left:auto; margin-right:auto; line-height:1.5;\">Sitio de fans no oficial. Reúne información de «Juego de Tronos», «La Casa del Dragón» y «El Caballero de los Siete Reinos», basadas en la obra de George R. R. Martin.<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  state = { section:'home', lang:'es', langOpen:false,\n            encTab:'characters', encSearch:'', encHouse:'all', encSel:null,\n            treeHouse:'targaryen', region:null, tlFilter:'all',\n            progress:'all', progMode:'serie', progOpen:false, curioOpen:{} };\n\n  // ---------- DATA ----------\n  HOUSES = [\n    { id:'targaryen', name:'Targaryen', words:'Fuego y Sangre', seat:'Rocadragón / Fortaleza Roja', region:'Las Coronas', animal:'Dragón de tres cabezas', c1:'#0b0b0b', c2:'#b5121b', accent:'#c9a44c', initial:'T',\n      status:'Casa real caída; renacida en el exilio', summary:'Descendientes de la antigua Valyria, los Targaryen escaparon a la Maldición y conquistaron los Siete Reinos a lomos de dragones. Gobernaron casi 300 años hasta la Rebelión de Robert.' },\n    { id:'stark', name:'Stark', words:'Se acerca el invierno', seat:'Invernalia', region:'El Norte', animal:'Huargo', c1:'#2f363c', c2:'#c8d0d6', accent:'#9aa7b0', initial:'S',\n      status:'Guardianes del Norte', summary:'Antigua estirpe de los Primeros Hombres, Reyes en el Norte durante milenios. Honorables y severos como su tierra, su lema es una advertencia, no una bravata.' },\n    { id:'lannister', name:'Lannister', words:'Oye mi rugido', seat:'Roca Casterly', region:'Tierras del Oeste', animal:'León', c1:'#7d1226', c2:'#d4af37', accent:'#d4af37', initial:'L',\n      status:'La casa más rica de Poniente', summary:'Señores de las minas de oro del Oeste. Astutos, orgullosos y temidos, su dicho extraoficial —\"Un Lannister siempre paga sus deudas\"— es tan célebre como su lema.' },\n    { id:'baratheon', name:'Baratheon', words:'Nuestra es la furia', seat:'Bastión de Tormentas', region:'Tierras de la Tormenta', animal:'Venado coronado', c1:'#161616', c2:'#e0b021', accent:'#e0b021', initial:'B',\n      status:'Casa real tras la Rebelión', summary:'La más joven de las grandes casas, fundada por Orys Baratheon. Robert ganó el Trono de Hierro; tras su muerte, sus hermanos y herederos lo despedazaron en guerra.' },\n    { id:'tyrell', name:'Tyrell', words:'Crecer fuerte', seat:'Altojardín', region:'El Dominio', animal:'Rosa de oro', c1:'#1f5a32', c2:'#7ec96a', accent:'#4fae5a', initial:'T',\n      status:'Señores del Dominio', summary:'Antaño mayordomos, ahora señores de las tierras más fértiles y pobladas de Poniente. Maestros de la política, las alianzas y los ejércitos numerosos.' },\n    { id:'martell', name:'Martell', words:'Nunca doblegado, nunca roto', seat:'Lanza del Sol', region:'Dorne', animal:'Sol atravesado por una lanza', c1:'#c2511c', c2:'#b51226', accent:'#e0681f', initial:'M',\n      status:'Príncipes de Dorne', summary:'Únicos que resistieron la conquista de Aegon. Dorne se unió al reino por matrimonio, no por fuego, y conserva sus propias leyes y un carácter ardiente.' },\n    { id:'tully', name:'Tully', words:'Familia, Deber, Honor', seat:'Aguasdulces', region:'Tierras de los Ríos', animal:'Trucha saltarina', c1:'#244e85', c2:'#9b1b30', accent:'#3a6fb0', initial:'T',\n      status:'Señores de los Ríos', summary:'Custodios del Tridente. Leales hasta el sacrificio, sus alianzas matrimoniales con Stark y Arryn fueron clave en la guerra contra los Lannister.' },\n    { id:'arryn', name:'Arryn', words:'Tan alto como el honor', seat:'Nido de Águilas', region:'El Valle', animal:'Halcón y luna', c1:'#1f5fa0', c2:'#eef3f8', accent:'#5b9bd6', initial:'A',\n      status:'Defensores del Valle', summary:'Descendientes de los Reyes de la Montaña y el Valle. Su fortaleza es inexpugnable, encaramada en lo alto de las Montañas de la Luna.' },\n    { id:'greyjoy', name:'Greyjoy', words:'Nosotros no sembramos', seat:'Pyke', region:'Islas del Hierro', animal:'Kraken', c1:'#14181c', c2:'#c9a23a', accent:'#c9a23a', initial:'G',\n      status:'Señores de las Islas del Hierro', summary:'Los Hombres del Hierro saquean en lugar de cosechar y \"pagan el precio del hierro\". Reyes rebeldes del mar, viven y mueren por la Vieja Costumbre.' },\n    { id:'tarly', name:'Tarly', words:'Primero en la batalla', seat:'Colina Cuerno', region:'El Dominio', animal:'Cazador a zancadas', c1:'#3a2410', c2:'#c0392b', accent:'#a3582a', initial:'T',\n      status:'Vasallos de los Tyrell', summary:'Reputados como los mejores soldados del Dominio. Lord Randyll Tarly es un comandante temido y un padre implacable con su hijo Samwell.' },\n    { id:'hightower', name:'Hightower', words:'Iluminamos el camino', seat:'Antigua', region:'El Dominio', animal:'Faro de fuego', c1:'#3a3f46', c2:'#dfe5ea', accent:'#9fb0bd', initial:'H',\n      status:'Señores de Antigua', summary:'Una de las casas más antiguas y ricas, guardianes de la Ciudadela y el faro de la Torre Alta. Su influencia desató la Danza de los Dragones.' },\n    { id:'velaryon', name:'Velaryon', words:'El Viejo, el Verdadero, el Audaz', seat:'Marcaderiva', region:'Las Coronas', animal:'Hipocampo (caballo de mar)', c1:'#0f5e5e', c2:'#cdd6db', accent:'#2b9b9b', initial:'V',\n      status:'Señores de las Mareas', summary:'Casa de sangre valyria y la mayor flota de Poniente. La \"Serpiente Marina\", Corlys Velaryon, fue el hombre más rico y viajero del reino.' },\n  ];\n\n  CHARS = [\n    // Stark\n    { id:'ned', name:'Eddard \"Ned\" Stark', house:'stark', title:'Guardián del Norte, Mano del Rey', status:'Muerto', sagas:['got'], culture:'Norteño', bio:'Lord de Invernalia, hombre de honor inquebrantable. Su sentido del deber lo llevó a Desembarco del Rey y, finalmente, al cadalso, encendiendo la Guerra de los Cinco Reyes.' },\n    { id:'cat', name:'Catelyn Stark (Tully)', house:'stark', title:'Lady de Invernalia', status:'Muerto', sagas:['got'], culture:'De los Ríos', bio:'Esposa de Ned y madre feroz. Su decisión de apresar a Tyrion y su amor desesperado por sus hijos marcaron el rumbo de la guerra. Murió en la Boda Roja.' },\n    { id:'robb', name:'Robb Stark', house:'stark', title:'Rey en el Norte', status:'Muerto', sagas:['got'], culture:'Norteño', bio:'El Joven Lobo, invicto en el campo de batalla pero traicionado en la mesa. Su muerte en la Boda Roja deshizo la causa del Norte.' },\n    { id:'jon', name:'Jon Nieve', house:'stark', title:'Lord Comandante; Rey en el Norte', status:'Vivo', sagas:['got'], culture:'Norteño', bio:'Criado como bastardo de Ned, hermano juramentado de la Guardia de la Noche. Su verdadero linaje —hijo de Rhaegar Targaryen y Lyanna Stark— lo convierte en heredero secreto del Trono.' },\n    { id:'sansa', name:'Sansa Stark', house:'stark', title:'Reina en el Norte', status:'Vivo', sagas:['got'], culture:'Norteña', bio:'De soñadora cortesana a astuta gobernante. Sobrevivió a Joffrey, Meñique y Ramsay para reclamar el Norte como reino independiente.' },\n    { id:'arya', name:'Arya Stark', house:'stark', title:'Hombre Sin Rostro', status:'Vivo', sagas:['got'], culture:'Norteña', bio:'Rebelde e indómita, se entrenó con los asesinos de Braavos. Mató al Rey de la Noche y, después, partió a explorar lo que hay al oeste de Poniente.' },\n    { id:'bran', name:'Bran Stark', house:'stark', title:'El Cuervo de Tres Ojos; Rey de los Seis Reinos', status:'Vivo', sagas:['got'], culture:'Norteño', bio:'Tras su caída quedó ligado a la magia: vidente, verdevidente y memoria viva del mundo. Fue elegido rey al final de la guerra.' },\n    // Lannister\n    { id:'tywin', name:'Tywin Lannister', house:'lannister', title:'Señor de Roca Casterly, Mano del Rey', status:'Muerto', sagas:['got'], culture:'Del Oeste', bio:'El hombre más poderoso de Poniente. Calculador y despiadado, restauró el prestigio de su casa y orquestó la Boda Roja. Murió a manos de su hijo Tyrion.' },\n    { id:'cersei', name:'Cersei Lannister', house:'lannister', title:'Reina de los Siete Reinos', status:'Muerto', sagas:['got'], culture:'Del Oeste', bio:'Madre de tres reyes y reina por derecho propio. Su amor por el poder y su odio destruyeron a casi todos los que amaba, incluida ella misma.' },\n    { id:'jaime', name:'Jaime Lannister', house:'lannister', title:'Lord Comandante de la Guardia Real', status:'Muerto', sagas:['got'], culture:'Del Oeste', bio:'El Matarreyes. Caballero brillante manchado por la traición a Aerys; su redención y su perdición estuvieron siempre atadas a Cersei.' },\n    { id:'tyrion', name:'Tyrion Lannister', house:'lannister', title:'Mano del Rey', status:'Vivo', sagas:['got'], culture:'Del Oeste', bio:'El Gnomo: brillante, mordaz y subestimado por su estatura. Su ingenio salvó Desembarco y guió, primero a Daenerys y luego a Bran, hacia el poder.' },\n    { id:'joffrey', name:'Joffrey Baratheon', house:'lannister', title:'Rey de los Siete Reinos', status:'Muerto', sagas:['got'], culture:'Del Oeste', bio:'Fruto del incesto de Cersei y Jaime. Cruel y cobarde, su reinado fue una tortura para el reino hasta que murió envenenado en su propia boda.' },\n    // Targaryen (GoT)\n    { id:'dany', name:'Daenerys Targaryen', house:'targaryen', title:'Madre de Dragones, Khaleesi, Reina', status:'Muerto', sagas:['got'], culture:'Valyria', bio:'Nacida en el exilio, rompió cadenas y crió tres dragones. Liberadora convertida en conquistadora, su descenso a la \"Reina Loca\" selló su destino bajo el cuchillo de Jon.' },\n    { id:'viserysT', name:'Viserys Targaryen', house:'targaryen', title:'\"El Rey Mendigo\"', status:'Muerto', sagas:['got'], culture:'Valyria', bio:'Hermano de Daenerys, obsesionado con recuperar el trono. Cruel y delirante, halló su \"corona de oro\" fundido por Khal Drogo.' },\n    { id:'rhaegar', name:'Rhaegar Targaryen', house:'targaryen', title:'Príncipe de Rocadragón', status:'Muerto', sagas:['got'], culture:'Valyria', bio:'Heredero culto y melancólico cuyo rapto (o fuga) con Lyanna Stark encendió la Rebelión de Robert. Murió en el Tridente. Padre secreto de Jon.' },\n    // Other GoT\n    { id:'robert', name:'Robert Baratheon', house:'baratheon', title:'Rey de los Siete Reinos', status:'Muerto', sagas:['got'], culture:'De la Tormenta', bio:'El Usurpador. Ganó el trono con su martillo de guerra pero gobernó con desgana, ahogado en vino y nostalgia por Lyanna.' },\n    { id:'stannis', name:'Stannis Baratheon', house:'baratheon', title:'Pretendiente al Trono', status:'Muerto', sagas:['got'], culture:'De la Tormenta', bio:'Hermano rígido y justo hasta la obsesión. Creyó ser el héroe profetizado, Azor Ahai, y lo sacrificó todo —incluso a su hija— por esa fe.' },\n    { id:'baelish', name:'Petyr \"Meñique\" Baelish', house:'tully', title:'Consejero de la Moneda', status:'Muerto', sagas:['got'], culture:'De los Dedos', bio:'De origen humilde, escaló mediante el caos, que llamaba \"una escalera\". Maestro de la manipulación; su ambición acabó degollada por Arya.' },\n    { id:'varys', name:'Varys', house:'targaryen', title:'Consejero de los Rumores', status:'Muerto', sagas:['got'], culture:'De Lys', bio:'La Araña. Eunuco y maestro de espías que decía servir \"al reino\". Cambió de bando por el bien común hasta arder por traicionar a Daenerys.' },\n    { id:'brienne', name:'Brienne de Tarth', house:'baratheon', title:'Lady Comandante de la Guardia Real', status:'Vivo', sagas:['got'], culture:'De la Tormenta', bio:'Caballero en todo salvo el título, hasta que Jaime la nombró. Encarnación del honor que el reino predica pero rara vez cumple.' },\n    { id:'hound', name:'Sandor \"El Perro\" Clegane', house:'lannister', title:'Guardia juramentado', status:'Muerto', sagas:['got'], culture:'Del Oeste', bio:'Guerrero brutal marcado por el fuego y por su hermano. Bajo la coraza, un protector reacio de las niñas Stark.' },\n    { id:'davos', name:'Davos Seaworth', house:'baratheon', title:'Mano del Rey', status:'Vivo', sagas:['got'], culture:'De la Tormenta', bio:'El Caballero de la Cebolla. Antiguo contrabandista de origen humilde cuya honestidad y sentido común lo hicieron consejero de reyes.' },\n    { id:'melisandre', name:'Melisandre', house:'targaryen', title:'Sacerdotisa Roja', status:'Muerto', sagas:['got'], culture:'De Asshai', bio:'Servidora de R\\u2019hllor, el Señor de Luz. Su fe y su magia de sangre cambiaron el rumbo de la guerra, para bien y para mal.' },\n    { id:'theon', name:'Theon Greyjoy', house:'greyjoy', title:'Príncipe de Pyke', status:'Muerto', sagas:['got'], culture:'Del Hierro', bio:'Criado como rehén de los Stark, dividido entre dos familias. Su traición, tortura y redención forman uno de los arcos más trágicos.' },\n    { id:'drogo', name:'Khal Drogo', house:'targaryen', title:'Khal de los Dothraki', status:'Muerto', sagas:['got'], culture:'Dothraki', bio:'Señor de la guerra de las llanuras, esposo de Daenerys. Su muerte y la pira funeraria dieron vida a los dragones.' },\n    { id:'jorah', name:'Jorah Mormont', house:'stark', title:'Caballero exiliado', status:'Muerto', sagas:['got'], culture:'De la Isla del Oso', bio:'Caballero deshonrado y leal eterno de Daenerys. Su amor no correspondido lo llevó a morir defendiéndola en Invernalia.' },\n    { id:'samwell', name:'Samwell Tarly', house:'tarly', title:'Maestre y Gran Maestre', status:'Vivo', sagas:['got'], culture:'Del Dominio', bio:'Despreciado por su padre por ser blando, demostró que la mente vence a la espada. Cronista que tituló la historia \"Canción de Hielo y Fuego\".' },\n IOS = [\n    { cat:'Libros vs. Serie', q:'¿Cuántas novelas hay y siguen sin terminar?', a:'La saga \"Canción de Hielo y Fuego\" planea siete novelas; se han publicado cinco. \"Vientos de Invierno\" lleva más de una década en espera, así que la serie de televisión adelantó al autor.' },\n    { cat:'Dragones', q:'¿Por qué los dragones menguaron?', a:'En su apogeo, los dragones Targaryen eran colosales (Balerion podía tragarse un mamut). Tras la Danza de los Dragones, las pocas crías nacieron cada vez más pequeñas hasta extinguirse, posiblemente por el cautiverio en el Pozo Dragón.' },\n    { cat:'Personajes', q:'¿Quién es realmente Jon Nieve?', a:'No es bastardo de Ned, sino hijo de Lyanna Stark y el príncipe Rhaegar Targaryen. Su nombre verdadero es Aegon Targaryen, lo que lo convierte en heredero legítimo del Trono de Hierro.' },\n    { cat:'Idiomas', q:'¿El valyrio y el dothraki son inventados?', a:'Sí: el lingüista David J. Peterson construyó lenguas completas con gramática y vocabulario para la serie, ampliando las pocas palabras que aparecían en los libros.' },\n    { cat:'Historia', q:'¿Qué fue la Danza de los Dragones?', a:'Una guerra civil Targaryen (129–131 d.C.) entre Rhaenyra (los Negros) y su medio hermano Aegon II (los Verdes). Diezmó a la familia y a casi todos los dragones, y es el corazón de \"La Casa del Dragón\".' },\n    { cat:'El Caballero', q:'¿Dónde encaja \"El Caballero de los Siete Reinos\"?', a:'Sucede unos 90 años antes de \"Juego de Tronos\" y sigue al caballero errante Ser Duncan el Alto y a su escudero \"Egg\", el futuro rey Aegon V Targaryen.' },\n    { cat:'Geografía', q:'¿Qué hay al oeste de Poniente?', a:'Es un misterio. Nadie que zarpó hacia el oeste del Mar del Ocaso ha regresado; por eso el viaje final de Arya resuena tanto entre los seguidores.' },\n    { cat:'Cultura', q:'¿Qué significa \"pagar el precio del hierro\"?', a:'La filosofía de los Hombres del Hierro: obtener lo que se desea tomándolo por la fuerza en combate, no compr llero de los Siete Reinos', era:'~209 d.C.', color:'#3a9b9b', desc:'Las aventuras de Ser Duncan el Alto y su escudero \"Egg\" recorren un reino en paz frágil. Basada en las novelas de Dunk y Egg.' },\n      ],\n      portals:[\n        { icon:'\\u{1F4DC}', title:'Enciclopedia', desc:'Personajes, casas y lugares de las tres sagas.', go:()=>this.go('encyclopedia') },\n        { icon:'\\u{1F333}', title:'Genealogía', desc:'Árboles de las grandes casas.', go:()=>this.go('tree') },\n        { icon:'\\u{1F5FA}', title:'Mapa', desc:'Las regiones de Poniente, interactivas.', go:()=>this.go('map') },\n        { icon:'\\u{1F570}', title:'Cronología', desc:'Ocho mil años de historia.', go:()=>this.go('timeline') },\n        { icon:'\\u2728', title:'Curiosidades', desc:'Secretos, mitos y datos.', go:()=>this.go('curios') },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
